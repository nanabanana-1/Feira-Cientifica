<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Sistema Escolar</title>

    <style>

        /* SITE */
        body {

            display: flex;

            justify-content: center;

            font-family: Arial;

            margin: 0;

        }

        /* CONTAINER */
        .container {

            width: 80%;

        }

        /* TOPO */
        header {

            display: flex;

            justify-content: space-between;

            align-items: flex-start;

            margin-top: 20px;

        }

        /* TÍTULO */
        .titulo {

            width: 100%;

            text-align: center;

        }

        /* MENU */
        summary {

            cursor: pointer;

            font-size: 30px;

        }

        /* TEXTO */
        .texto {

            text-align: center;

            margin-top: 40px;

        }

        /* ILUSTRAÇÃO */
        .ilustracao {

            display: flex;

            justify-content: center;

            align-items: center;

            gap: 40px;

            margin-top: 40px;

        }

        /* CAIXA DOS ÍCONES */
        .caixa-icones {

            border: 1px solid black;

            width: 300px;

            height: 300px;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

        }

        /* AVISOS E HORÁRIOS */
        .linha {

            display: flex;

            justify-content: center;

            gap: 30px;

        }

        /* ÍCONES */
        .icone {

            text-align: center;

        }

        /* BIMESTRAIS */
        .baixo {

            text-align: center;

            margin-top: 20px;

        }

        /* CAIXA CHATBOT */
        .caixa-chatbot {

            border: 1px solid black;

            width: 300px;

            height: 300px;

            margin-top: 20px;

            display: flex;

            justify-content: center;

            align-items: center;

        }

        /* PNG + TEXTO CHATBOT */
        .chatbot-conteudo {

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 20px;

            text-align: center;

        }

        /* BOTÕES */
        .botoes {

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 20px;

            margin-top: 30px;

        }

        button {

            padding: 10px 30px;

            cursor: pointer;

        }

        button a {

            text-decoration: none;

            color: black;

        }

        /* RODAPÉ */
        footer {

            margin-top: 40px;

            margin-bottom: 40px;

        }

        /* RODAPÉ COM MASCOTE */
        .rodape-mascote {

            display: flex;

            justify-content: center;

            align-items: center;

            gap: 15px;

        }

    </style>

</head>

<body>

    <!-- CONTAINER -->
    <div class="container">

        <!-- TOPO -->
        <header>

            <!-- TÍTULO -->
            <div class="titulo">

                <h1>
                    SISTEMA DIGITAL DE COMUNICAÇÃO
                    ESCOLAR INTELIGENTE
                </h1>

            </div>

            <!-- MENU -->
            <details>

                <summary>☰</summary>

                <nav>

                    <ul>

                        <li>
                            <a href="index.html">
                                Início
                            </a>
                        </li>

                        <li>
                            <a href="avisos.html">
                                Avisos
                            </a>
                        </li>

                        <li>
                            <a href="arquivos.html">
                                Arquivos
                            </a>
                        </li>

                        <li>
                            <a href="normas.html">
                                Normas Escolares
                            </a>
                        </li>

                    </ul>

                </nav>

            </details>

        </header>

        <!-- TEXTO -->
        <section class="texto">

            <h2>
                SEJA BEM-VINDO
            </h2>

            <p>
                Aqui você entra com segurança
            </p>

        </section>

        <!-- ILUSTRAÇÃO -->
        <section class="ilustracao">

            <!-- ALUNO -->
            <img src="aluno.png"
                 alt="Aluno estudando"
                 width="250">

            <!-- LADO DIREITO -->
            <div>

                <!-- CAIXA ÍCONES -->
                <div class="caixa-icones">

                    <!-- LINHA -->
                    <div class="linha">

                        <!-- AVISOS -->
                        <div class="icone">

                            <img src="avisos.png"
                                 alt="Avisos"
                                 width="80">

                            <h3>
                                Avisos
                            </h3>

                        </div>

                        <!-- HORÁRIOS -->
                        <div class="icone">

                            <img src="horarios.png"
                                 alt="Horários"
                                 width="80">

                            <h3>
                                Horários
                            </h3>

                        </div>

                    </div>

                    <!-- BIMESTRAIS -->
                    <div class="baixo">

                        <img src="calendario.png"
                             alt="Calendário"
                             width="80">

                        <h3>
                            Bimestrais
                        </h3>

                    </div>

                </div>

                <!-- CAIXA CHATBOT -->
                <div class="caixa-chatbot">

                    <div class="chatbot-conteudo">

                        <img src="mascote.png"
                             alt="Mascote chatbot"
                             width="120">

                        <h2>
                            ChatBot Mascote
                        </h2>

                    </div>

                </div>

            </div>

        </section>

        <!-- BOTÕES -->
        <section class="botoes">

            <!-- ALUNO -->
            <button>

                <a href="login-aluno.html">
                    ALUNO
                </a>

            </button>

            <!-- GESTÃO -->
            <button>

                <a href="login-gestao.html">
                    GESTÃO
                </a>

            </button>

        </section>

        <!-- RODAPÉ -->
        <footer>

            <div class="rodape-mascote">

                <img src="mascote.png"
                     alt="Mascote"
                     width="80">

                <p>

                    Dúvidas? fale com o
                    <strong>Mas_cote!</strong>

                </p>

            </div>

        </footer>

    </div>

</body>

</html>
